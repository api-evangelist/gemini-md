aid: gemini-md
name: GEMINI.md
description: >-
  GEMINI.md is the project context file convention used by the Google Gemini
  CLI to provide project-specific instructions, coding standards, architectural
  notes, and development workflows to the Gemini AI agent. The format follows
  a hierarchical, plain Markdown structure that the Gemini CLI loads
  automatically from the working directory and parent directories, layering
  global, project, and subproject context. It mirrors similar agent context
  conventions like CLAUDE.md and AGENTS.md.
